<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  margin:0;padding:0;
  background:
    radial-gradient(ellipse 900px 600px at top right, rgba(236,72,153,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 700px 500px at bottom left, rgba(139,92,246,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 500px 400px at 30% 60%, rgba(99,102,241,0.08) 0%, transparent 60%),
    linear-gradient(150deg, #FDF4FF 0%, #FAF0FF 20%, #F3E8FF 45%, #EDE9FE 70%, #E0F2FE 100%) !important;
  background-attachment:fixed;
  color:#1e1040;
  font-family:"Nunito","M PLUS Rounded 1c","Hiragino Maru Gothic ProN","Quicksand",-apple-system,BlinkMacSystemFont,sans-serif;
  font-weight:600;
  overflow-x:hidden;overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;
  min-height:100vh;
  letter-spacing:0.01em;
  font-feature-settings:"palt","kern";
  font-variant-numeric:proportional-nums;
}

#root{min-height:100vh;background:transparent}

/* Loading screen */
.l{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse at center, #FBF7EE 0%, #EDD9B0 100%);
  z-index:9999;
  flex-direction:column;
}
.e{
  font-size:70px;
  animation:b 1.8s ease-in-out infinite;
  filter:drop-shadow(0 6px 18px rgba(184,134,11,0.35));
}
.t{
  margin-top:18px;
  color:#7a5a45;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.3em;
  text-transform:uppercase;
  font-family:"Cinzel","Cormorant Garamond",serif;
}

@keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:0.9}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes goldGlow{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,0)}50%{box-shadow:0 0 20px 4px rgba(139,92,246,0.25)}}
@keyframes screenEnter{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardFlip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
@keyframes monsterFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
@keyframes monsterAttack{0%{transform:translateX(0)}30%{transform:translateX(18px)}60%{transform:translateX(-10px)}100%{transform:translateX(0)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes swayLeft{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes swayRight{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-3deg)}}

/* 全要素に滑らかなトランジション */
*{
  -webkit-tap-highlight-color: transparent;
  box-sizing: border-box;
}

/* スクロール慣性（iOS） */
[style*="overflow"]{
  -webkit-overflow-scrolling: touch;
}

svg{image-rendering:pixelated;image-rendering:crisp-edges}

/* スクロールバー完全非表示 */
::-webkit-scrollbar{display:none;width:0;height:0}
*{scrollbar-width:none;-ms-overflow-style:none}

/* 背景の点描 */
body::before{
  content:"";
  position:fixed;inset:0;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(139,92,246,0.08) 2px, transparent 5px),
    radial-gradient(circle at 75% 55%, rgba(99,102,241,0.07) 2.5px, transparent 6px),
    radial-gradient(circle at 45% 85%, rgba(168,85,247,0.06) 2px, transparent 5px),
    radial-gradient(circle at 85% 20%, rgba(139,92,246,0.08) 2px, transparent 5px),
    radial-gradient(circle at 28% 62%, rgba(99,102,241,0.06) 1.5px, transparent 4px);
  background-size:300px 300px,250px 250px,280px 280px,200px 200px,320px 320px;
  pointer-events:none;
  z-index:-1;
}

/* 大画面対応 */
@media (min-width: 768px) {
  #root { max-width: 480px; margin: 0 auto; box-shadow: 0 0 60px rgba(139,92,246,0.12); min-height: 100vh; }
}
@media (min-width: 1200px) {
  body { background: radial-gradient(ellipse at center, #FDF4FF 0%, #EDE9FE 100%) !important; }
  #root { max-width: 480px; box-shadow: 0 0 80px rgba(139,92,246,0.2), 0 8px 32px rgba(0,0,0,0.08); }
}

/* トップライン */
body::after{
  content:"";
  position:fixed;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg, 
    transparent 0%, 
    rgba(167,139,250,0.6) 25%, 
    rgba(139,92,246,0.8) 50%, 
    rgba(167,139,250,0.6) 75%, 
    transparent 100%);
  pointer-events:none;
  z-index:9998;
}

/* ボタン：滑らかなタップ反応 */
button{
  position:relative;
  transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
              box-shadow 0.2s ease,
              background 0.2s ease,
              opacity 0.15s ease !important;
  will-change: transform;
}
button:active{
  transform: scale(0.95) !important;
}
button:not(:disabled):hover{
  filter: brightness(1.04);
}

/* 全画面トランジション */
[style*="screenEnter"]{
  animation: screenEnter 0.35s cubic-bezier(0.34, 1.2, 0.64, 1) both;
}
[style*="popIn"]{
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
[style*="fadeIn"]{
  animation: fadeIn 0.3s ease both;
}

/* h1-h2 */
h1, h2{
  font-family:"Nunito","M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif !important;
  font-weight:800 !important;
  letter-spacing:-0.01em !important;
}
h3, h4{
  font-family:"Nunito","M PLUS Rounded 1c",sans-serif !important;
  font-weight:700 !important;
}
