<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;padding:0;
  background:linear-gradient(135deg, #fff0f9 0%, #f0e5ff 50%, #e8f0ff 100%);
  background-attachment:fixed;
  color:#3d1a4a;
  font-family:"M PLUS Rounded 1c","DotGothic16","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
  overflow-x:hidden;overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;
  min-height:100vh;
}
#root{min-height:100vh}
.l{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg, #fff0f9 0%, #f0e5ff 50%, #e8f0ff 100%);
  z-index:9999;flex-direction:column
}
.e{font-size:60px;animation:b 1.5s ease-in-out infinite}
.t{margin-top:12px;color:#9333ea;font-size:14px;font-weight:700}
@keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.85}}
@keyframes sparkle{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
svg{image-rendering:pixelated;image-rendering:crisp-edges}
/* ポップテーマ用カスタムスクロールバー */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:rgba(255,105,180,0.1);border-radius:99px}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#FF69B4,#8A2BE2);border-radius:99px}
/* キラキラ背景の星 */
body::before{
  content:"";position:fixed;inset:0;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,215,0,0.15) 1px, transparent 2px),
    radial-gradient(circle at 80% 50%, rgba(255,105,180,0.15) 1px, transparent 2px),
    radial-gradient(circle at 30% 80%, rgba(138,43,226,0.15) 1px, transparent 2px),
    radial-gradient(circle at 70% 10%, rgba(255,215,0,0.15) 1px, transparent 2px);
  background-size:300px 300px,200px 200px,250px 250px,150px 150px;
  pointer-events:none;z-index:-1;
}
</style>

<script>
(function(){
try{
const b=document.getElementById("c").textContent;
const bin=atob(b);
const bytes=new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
const src=pako.ungzip(bytes,{to:"string"});
const t=Babel.transform(src,{presets:["react"]}).code;
eval("(function(){"+t+";window.App=App;})()");
const r=ReactDOM.createRoot(document.getElementById("root"));
r.render(React.createElement(window.App));
document.getElementById("l").style.display="none";
}catch(e){
console.error(e);
document.getElementById("l").innerHTML='<div style="color:#9333ea;text-align:center;padding:20px;font-size:14px;">⚠️ '+e.message+'<br><br><button onclick="location.reload()" style="background:linear-gradient(135deg,#FF69B4,#8A2BE2);color:#fff;border:none;border-radius:99px;padding:10px 20px;font-weight:700;">再読み込み</button></div>';
}
})();
</script>
