*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;padding:0;
  background:linear-gradient(135deg, #FFF8F0 0%, #FFEBE1 50%, #FFE5D9 100%);
  background-attachment:fixed;
  color:#5a4640;
  font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
  overflow-x:hidden;overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;
  min-height:100vh;
}
#root{min-height:100vh}
.l{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg, #FFF8F0 0%, #FFEBE1 50%, #FFE5D9 100%);
  z-index:9999;flex-direction:column
}
.e{font-size:60px;animation:b 1.5s ease-in-out infinite}
.t{margin-top:12px;color:#aa8d70;font-size:14px;font-weight:700}
@keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.85}}
svg{image-rendering:pixelated;image-rendering:crisp-edges}
/* スクロールバー: コーラル系 */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:rgba(245,145,130,0.1);border-radius:99px}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#F59182,#D7AF82);border-radius:99px}
/* ほんわり装飾 */
body::before{
  content:"";position:fixed;inset:0;
  background-image:
    radial-gradient(circle at 15% 25%, rgba(245,145,130,0.08) 2px, transparent 4px),
    radial-gradient(circle at 75% 60%, rgba(215,175,130,0.08) 2px, transparent 4px),
    radial-gradient(circle at 40% 85%, rgba(180,200,165,0.08) 2px, transparent 4px),
    radial-gradient(circle at 85% 15%, rgba(245,145,130,0.06) 2px, transparent 4px);
  background-size:280px 280px,220px 220px,250px 250px,180px 180px;
  pointer-events:none;z-index:-1;
}

<script>
(function(){
try{
const b=document.getElementById("c").textContent;
const bin=atob(b);
const bytes=new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
const src=pako.ungzip(bytes,{to:"string"});
const t=Babel.transform(src,{presets:["react"]}).code;
eval("(function(){"+t+";window.App=App;})()");
const r=ReactDOM.createRoot(document.getElementById("root"));
r.render(React.createElement(window.App));
document.getElementById("l").style.display="none";
}catch(e){
console.error(e);
document.getElementById("l").innerHTML='<div style="color:#5a4640;text-align:center;padding:20px;font-size:14px;">⚠️ '+e.message+'<br><br><button onclick="location.reload()" style="background:linear-gradient(135deg,#F59182,#D7AF82);color:#fff;border:none;border-radius:99px;padding:10px 20px;font-weight:700;">再読み込み</button></div>';
}
})();
</script>
