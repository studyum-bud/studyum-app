<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  margin:0;padding:0;
  background:
    radial-gradient(ellipse 1200px 800px at top right, rgba(212,175,55,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 1000px 600px at bottom left, rgba(184,134,11,0.10) 0%, transparent 50%),
    radial-gradient(ellipse 800px 400px at top left, rgba(255,250,240,0.6) 0%, transparent 60%),
    linear-gradient(160deg, #FBF7EE 0%, #F5EBD8 25%, #F0E0C0 55%, #EDD9B0 85%, #E8D098 100%) !important;
  background-attachment:fixed;
  color:#2C1810;
  font-family:"Cormorant Garamond","Playfair Display","Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",-apple-system,BlinkMacSystemFont,serif;
  font-weight:500;
  overflow-x:hidden;overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;
  min-height:100vh;
  letter-spacing:0.02em;
  font-feature-settings:"palt","kern";
  font-variant-numeric:proportional-nums;
}

#root{min-height:100vh;background:transparent}

/* Loading screen */
.l{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse at center, #FBF7EE 0%, #EDD9B0 100%);
  z-index:9999;
  flex-direction:column;
}
.e{
  font-size:70px;
  animation:b 1.8s ease-in-out infinite;
  filter:drop-shadow(0 6px 18px rgba(184,134,11,0.35));
}
.t{
  margin-top:18px;
  color:#7a5a45;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.3em;
  text-transform:uppercase;
  font-family:"Cinzel","Cormorant Garamond",serif;
}

@keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.85}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes goldGlow{0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,0)}50%{box-shadow:0 0 20px 4px rgba(212,175,55,0.3)}}

svg{image-rendering:pixelated;image-rendering:crisp-edges}

/* スクロールバー完全非表示 */
::-webkit-scrollbar{display:none;width:0;height:0}
*{scrollbar-width:none;-ms-overflow-style:none}

/* 金箔風の繊細な背景模様 */
body::before{
  content:"";
  position:fixed;inset:0;
  background-image:
    radial-gradient(circle at 12% 22%, rgba(212,175,55,0.14) 2.5px, transparent 6px),
    radial-gradient(circle at 78% 58%, rgba(184,134,11,0.12) 3px, transparent 6px),
    radial-gradient(circle at 42% 88%, rgba(218,165,32,0.10) 2px, transparent 5px),
    radial-gradient(circle at 88% 18%, rgba(212,175,55,0.13) 2.5px, transparent 6px),
    radial-gradient(circle at 25% 65%, rgba(184,134,11,0.10) 1.5px, transparent 4px),
    radial-gradient(circle at 60% 35%, rgba(218,165,32,0.09) 2px, transparent 5px),
    radial-gradient(circle at 5% 50%, rgba(212,175,55,0.08) 1.5px, transparent 4px),
    radial-gradient(circle at 95% 75%, rgba(184,134,11,0.09) 2px, transparent 5px);
  background-size:280px 280px,220px 220px,260px 260px,190px 190px,310px 310px,240px 240px,180px 180px,260px 260px;
  pointer-events:none;
  z-index:-1;
}

/* 上部の繊細なゴールドライン */
body::after{
  content:"";
  position:fixed;
  top:0;left:0;right:0;
  height:1.5px;
  background:linear-gradient(90deg, 
    transparent 0%, 
    rgba(212,175,55,0.5) 25%, 
    rgba(218,165,32,0.7) 50%, 
    rgba(212,175,55,0.5) 75%, 
    transparent 100%);
  pointer-events:none;
  z-index:9998;
  box-shadow:0 1px 4px rgba(184,134,11,0.3);
}

/* 全てのボタンに微細な金属感を */
button{
  position:relative;
  transition:all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
}
button:active{
  transform:scale(0.98);
}

/* h1-h4をエレガントなセリフに */
h1, h2{
  font-family:"Cinzel","Cormorant Garamond","Noto Serif JP",serif !important;
  letter-spacing:0.05em !important;
  font-weight:700 !important;
}
h3, h4{
  font-family:"Cormorant Garamond","Noto Serif JP",serif !important;
  letter-spacing:0.03em !important;
}
</style>
</head>

<script>
(function(){
try{
const b=document.getElementById("c").textContent;
const bin=atob(b);
const bytes=new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
const src=pako.ungzip(bytes,{to:"string"});
const t=Babel.transform(src,{presets:["react"]}).code;
eval("(function(){"+t+";window.App=App;})()");
const r=ReactDOM.createRoot(document.getElementById("root"));
r.render(React.createElement(window.App));
document.getElementById("l").style.display="none";
}catch(e){
console.error(e);
document.getElementById("l").innerHTML='<div style="color:#2C1810;text-align:center;padding:20px;font-size:14px;font-family:Cormorant Garamond,serif;">⚠️ '+e.message+'<br><br><button onclick="location.reload()" style="background:linear-gradient(135deg,#B8860B,#DAA520);color:#fff;border:none;border-radius:99px;padding:12px 28px;font-weight:700;letter-spacing:0.1em;">再読み込み</button></div>';
}
})();
</script>
