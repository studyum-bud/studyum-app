*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{

  background-attachment:fixed;

}
#root{min-height:100vh}
.l{
  position:fixed;inset:0;

  z-index:9999;flex-direction:column
}
.e{font-size:60px;animation:b 1.5s ease-in-out infinite}
.t{margin-top:12px;color:#7a5a45;font-size:14px;font-weight:700}

svg{image-rendering:pixelated;image-rendering:crisp-edges}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:rgba(233,79,55,0.1);border-radius:99px}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#E94F37,#B07840);border-radius:99px}
body::before{
  content:"";position:fixed;inset:0;
  background-image:

  pointer-events:none;z-index:-1;
}

<script>
(function(){
try{
const b=document.getElementById("c").textContent;
const bin=atob(b);
const bytes=new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
const src=pako.ungzip(bytes,{to:"string"});
const t=Babel.transform(src,{presets:["react"]}).code;
eval("(function(){"+t+";window.App=App;})()");
const r=ReactDOM.createRoot(document.getElementById("root"));
r.render(React.createElement(window.App));
document.getElementById("l").style.display="none";
}catch(e){
console.error(e);
document.getElementById("l").innerHTML='<div style="color:#3d2818;text-align:center;padding:20px;font-size:14px;">⚠️ '+e.message+'<br><br><button onclick="location.reload()" style="background:linear-gradient(135deg,#E94F37,#B07840);color:#fff;border:none;border-radius:99px;padding:10px 20px;font-weight:700;">再読み込み</button></div>';
}
})();
</script>
